# DevRadar — Nginx site config (Hostinger VPS).
# Domain TBD (devradar.io / .app / .fun — ALFA to confirm; replace
# devradar.org below, then run certbot --nginx).
#
# Routing:
#   /                → Next.js web (:3000)
#   /api/feed/live   → web SSE (buffering OFF, long timeouts)
#   /webhook/helius  → worker ingest (:8787) — point the Helius
#                      webhook at https://<domain>/webhook/helius

upstream devradar_web {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream devradar_worker {
  server 127.0.0.1:8787;
  keepalive 8;
}

server {
  listen 80;
  listen [::]:80;
  server_name devradar.org;

  # certbot will add the 443 server block + redirect on first run:
  #   certbot --nginx -d devradar.org

  client_max_body_size 2m;

  # ── SSE: no buffering, no timeouts that kill idle streams ──────
  location /api/feed/live {
    proxy_pass http://devradar_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection '';
    proxy_buffering off;            # SSE must stream
    proxy_cache off;
    gzip off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
    chunked_transfer_encoding on;
  }

  # ── Helius webhook → worker fast-path ──────────────────────────
  location /webhook/helius {
    proxy_pass http://devradar_worker;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 15s;
  }

  # ── Everything else → Next.js ──────────────────────────────────
  location / {
    proxy_pass http://devradar_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_read_timeout 60s;
  }
}
