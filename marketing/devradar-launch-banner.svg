<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldtx" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#F4D789"/><stop offset="0.5" stop-color="#E2B65B"/><stop offset="1" stop-color="#B9893A"/>
    </linearGradient>
    <linearGradient id="goldbtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D789"/><stop offset="0.55" stop-color="#E2B65B"/><stop offset="1" stop-color="#B9893A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E2B65B" stop-opacity="0.22"/><stop offset="1" stop-color="#E2B65B" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>

  <rect width="1600" height="900" fill="#060607"/>
  <rect x="400" y="-300" width="800" height="900" fill="url(#glow)"/>

  <!-- radar rings behind ticker -->
  <g stroke="#E2B65B" fill="none">
    <circle cx="800" cy="430" r="200" stroke-opacity="0.08"/>
    <circle cx="800" cy="430" r="320" stroke-opacity="0.06"/>
    <circle cx="800" cy="430" r="460" stroke-opacity="0.04"/>
    <circle cx="800" cy="430" r="620" stroke-opacity="0.025"/>
  </g>

  <rect width="1600" height="900" filter="url(#grain)" opacity="0.05"/>

  <!-- top bar -->
  <g transform="translate(122,84) scale(0.30)">
    <path d="M -100 0 C -55 -42 55 -42 100 0 C 55 42 -55 42 -100 0 Z" fill="none" stroke="url(#goldbtn)" stroke-width="11" stroke-linejoin="round"/>
    <circle r="40" fill="#E2B65B" fill-opacity="0.06" stroke="url(#goldbtn)" stroke-width="6" stroke-opacity="0.7"/>
    <circle r="27" fill="url(#goldbtn)"/>
    <circle cx="11" cy="-11" r="7" fill="#060607"/>
  </g>
  <text x="164" y="93" font-family="Geist" font-weight="600" font-size="27" letter-spacing="3" fill="#F4F2EC">DEV<tspan fill="#E2B65B">RADAR</tspan></text>
  <text x="1504" y="91" text-anchor="end" font-family="Geist Mono" font-weight="500" font-size="15" letter-spacing="2" fill="#9C9A93">@DevRadarS <tspan fill="#E2B65B">·</tspan> t.me/devradars</text>
  <line x1="96" y1="132" x2="1504" y2="132" stroke="#F4F2EC" stroke-opacity="0.08"/>

  <!-- kicker: NOW LIVE -->
  <circle cx="650" cy="262" r="6" fill="#5CDD94" filter="url(#soft)"/>
  <circle cx="650" cy="262" r="5" fill="#5CDD94"/>
  <text x="672" y="268" font-family="Geist Mono" font-weight="600" font-size="17" letter-spacing="4" fill="#5CDD94">NOW LIVE</text>
  <text x="800" y="268" font-family="Geist Mono" font-weight="500" font-size="17" letter-spacing="4" fill="#9C9A93"> · TOKEN LAUNCH</text>

  <!-- giant ticker -->
  <text x="800" y="470" text-anchor="middle" font-family="Geist" font-weight="700" font-size="156" letter-spacing="-3" fill="url(#goldtx)">$RADAR</text>

  <!-- name + tagline -->
  <text x="800" y="548" text-anchor="middle" font-family="Geist" font-weight="600" font-size="40" letter-spacing="-0.5" fill="#F4F2EC">DevRadar</text>
  <text x="800" y="600" text-anchor="middle" font-family="Geist" font-weight="400" font-size="24" fill="#9C9A93">The deployer-intelligence token. <tspan fill="#F4F2EC">Know the dev before you ape.</tspan></text>

  <!-- venue pill -->
  <rect x="625" y="680" width="350" height="58" rx="29" fill="url(#goldbtn)"/>
  <text x="800" y="717" text-anchor="middle" font-family="Geist Mono" font-weight="600" font-size="16" letter-spacing="2" fill="#1A1305">LIVE ON PUMP.FUN</text>

  <!-- links -->
  <text x="800" y="800" text-anchor="middle" font-family="Geist Mono" font-weight="500" font-size="17" letter-spacing="1" fill="#9C9A93">x.com/DevRadarS   <tspan fill="#E2B65B">·</tspan>   t.me/devradars   <tspan fill="#E2B65B">·</tspan>   devradar.org</text>
</svg>